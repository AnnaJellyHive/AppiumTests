name: Appium Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  checks: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AppiumTests
        uses: actions/checkout@v4

      - name: Checkout TimerApp
        uses: actions/checkout@v4
        with:
          repository: AnnaJellyHive/TimerApp
          path: TimerApp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: TimerApp
        run: npm ci

      - name: Bundle JS into APK
        working-directory: TimerApp
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: TimerApp/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2

      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium server
        run: appium --log-level warn &

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            adb install TimerApp/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.timerapp/.MainActivity
            sleep 60
            adb shell pidof com.timerapp || echo "WARN: appen körde inte efter warm-up"
            adb shell am force-stop com.timerapp
            adb logcat -c
            adb logcat -v time *:W com.timerapp:V ReactNativeJS:V AndroidRuntime:V > logcat.txt &
            LOGCAT_PID=$!
            mvn test -Dcucumber.filter.tags="@sekvens"
            kill $LOGCAT_PID || true

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: target/cucumber-reports/report.html

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: logcat.txt
