name: Appium Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  checks: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AppiumTests
        uses: actions/checkout@v4

      - name: Checkout TimerApp
        uses: actions/checkout@v4
        with:
          repository: AnnaJellyHive/TimerApp
          path: TimerApp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TimerApp/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('TimerApp/android/**/*.gradle*', 'TimerApp/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Cache APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: TimerApp/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-${{ hashFiles('TimerApp/package-lock.json', 'TimerApp/android/**/*.gradle*', 'TimerApp/android/gradle/wrapper/gradle-wrapper.properties', 'TimerApp/index.js', 'TimerApp/src/**') }}

      - name: Install npm dependencies
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: TimerApp
        run: npm ci

      - name: Bundle JS into APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: TimerApp
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        if: steps.apk-cache.outputs.cache-hit != 'true'
        working-directory: TimerApp/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers 2

      - name: Cache Appium driver
        id: appium-cache
        uses: actions/cache@v4
        with:
          path: ~/.appium
          key: appium-uiautomator2-${{ hashFiles('.github/workflows/appium-tests.yml') }}

      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium
          if [ "${{ steps.appium-cache.outputs.cache-hit }}" != "true" ]; then
            appium driver install uiautomator2
          fi

      - name: Start Appium server
        run: appium --log-level warn &

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            adb shell settings put global hide_error_dialogs 1
            adb install TimerApp/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.timerapp/.MainActivity
            sleep 60
            adb shell pidof com.timerapp || echo "WARN: appen körde inte efter warm-up"
            adb shell am force-stop com.timerapp
            adb logcat -c
            adb logcat -v time *:W com.timerapp:V ReactNativeJS:V AndroidRuntime:V > logcat.txt &
            LOGCAT_PID=$!
            mvn test -Dcucumber.filter.tags="@sekvens"
            kill $LOGCAT_PID || true

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cucumber Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: target/cucumber-reports/report.html

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: logcat.txt
